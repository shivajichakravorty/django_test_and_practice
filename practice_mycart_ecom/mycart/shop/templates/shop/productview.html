<!-- prettier-ignore -->

{% extends "shop/basic.html" %}
{% block title %}{{ product.product_name }} - My Cart{% endblock %}
{% block content %}
<div class="container my-4">
  <div class="row">
    <div class="col-md-4">
      <img
        src="{{ product.image.url }}"
        class="img-fluid"
        alt="{{ product.product_name }}"
      />
    </div>
    <div class="col-md-8">
      <h2>{{ product.product_name }}</h2>
      <p><strong>Price:</strong> ${{ product.price }}</p>
      <p>{{ product.desc }}</p>
      <hr />
      <button id="pr{{product.id}}" class="btn btn-primary addtocart">
        Add to Cart
      </button>
      <a href="/shop/checkout" class="btn btn-secondary">Checkout</a>
    </div>
  </div>
</div>
{% endblock %}
