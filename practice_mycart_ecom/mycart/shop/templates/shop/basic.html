<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}My Cart{% endblock %}</title>
    <style>
      .carousel-indicators button {
        background-color: blue;
      }

      .carousel-control-prev-icon,
      .carousel-control-next-icon {
        background-color: blue;
      }

      .no-padding {
        padding-left: 0;
        padding-right: 0;
      }
    </style>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">My Cart</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/shop"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shop/about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shop/contact">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shop/tracker">Tracker</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shop/checkout">Checkout</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">
              Search
            </button>
          </form>
          <button
            type="button"
            class="btn btn-secondary mx-2"
            id="popcart"
            data-bs-container="body"
            data-bs-toggle="popover"
            data-bs-placement="bottom"
          >
            Cart (<span id="cartItemCount">0</span>)
          </button>
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    {% block js %}
    <script>
      // Function to safely escape HTML to prevent XSS
      function escapeHTML(str) {
        var p = document.createElement("p");
        p.appendChild(document.createTextNode(str || ""));
        return p.innerHTML;
      }

      // Initialize cart from localStorage, handling null/corrupted case
      var cart;
      try {
        cart = JSON.parse(localStorage.getItem("cart")) || {};
        // Basic validation to ensure it's an object
        if (typeof cart !== "object" || cart === null)
          throw new Error("Cart is not an object");

        // Check for old cart format (where value is a number, not an array) and reset.
        const firstItemKey = Object.keys(cart)[0];
        if (firstItemKey && !Array.isArray(cart[firstItemKey])) {
          console.warn("Old cart format detected. Resetting cart.");
          cart = {};
          localStorage.setItem("cart", "{}");
        }
      } catch (e) {
        console.error("Could not parse cart from localStorage. Resetting.", e);
        var cart = {};
        localStorage.setItem("cart", "{}");
      }

      // --- Event Handlers using Delegation ---

      // Handle Add to Cart click
      $("body").on("click", ".addtocart", function () {
        var idstr = this.id.toString();
        // Find the span with the data-name attribute
        var name = $(this).closest("span[data-name]").data("name");

        // Prevent adding to cart if name is missing
        if (name === undefined) {
          console.error(
            "Could not add item to cart. Product name is missing for ID: " +
              idstr,
          );
          return;
        }

        if (cart[idstr]) {
          cart[idstr][0] += 1; // Increment quantity
        } else {
          // Store as [quantity, name]
          cart[idstr] = [1, name];
        }
        updateCartAndUI(cart, idstr);
      });

      // Handle Plus button click
      $("body").on("click", ".plus", function () {
        var idstr = this.id.substring(4); // e.g., from 'pluspr1' to 'pr1'
        if (cart[idstr]) {
          cart[idstr][0] += 1; // Update quantity in the array
          updateCartAndUI(cart, idstr);
        }
      });

      // Handle Minus button click
      $("body").on("click", ".minus", function () {
        var idstr = this.id.substring(5); // e.g., from 'minuspr1' to 'pr1'
        if (cart[idstr]) {
          cart[idstr][0] -= 1; // Update quantity in the array
          if (cart[idstr][0] <= 0) {
            delete cart[idstr];
          }
          updateCartAndUI(cart, idstr);
        }
      });

      // --- Helper Functions ---

      function updateCartAndUI(cart, itemId) {
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartDisplay(cart);
        updateButtonUI(cart, itemId);
        updatePopover(cart);
      }

      function updateButtonUI(cart, itemId) {
        var buttonContainer = document.getElementById("div" + itemId);
        if (buttonContainer) {
          var itemData = cart[itemId];
          if (itemData === undefined || itemData[0] <= 0) {
            buttonContainer.innerHTML = `<button id="${itemId}" class="btn btn-sm btn-primary addtocart">Add to Cart</button>`;
          } else {
            var qty = itemData[0];
            buttonContainer.innerHTML = `<button id="minus${itemId}" class='btn btn-sm btn-primary minus'>-</button> <span id='span${itemId}' class="mx-2">${qty}</span> <button id="plus${itemId}" class='btn btn-sm btn-primary plus'>+</button>`;
          }
        }
      }

      function updateCartDisplay(cart) {
        var totalItems = 0;
        for (var item in cart) {
          totalItems += cart[item][0]; // Sum quantities from the array
        }
        $("#cartItemCount").text(totalItems);
      }

      function updatePopover(cart) {
        var popStr = "<ul>";
        if (Object.keys(cart).length === 0) {
          popStr = "Your cart is empty.";
        } else {
          for (var item in cart) {
            var qty = cart[item][0];
            var name = cart[item][1];
            popStr += `<li><b>${escapeHTML(name)}</b>: Qty: ${qty}</li>`;
          }
          popStr +=
            "</ul><a href='/shop/checkout' class='btn btn-primary btn-sm mt-2'>Checkout</a>";
        }

        var popoverEl = document.getElementById("popcart");
        var popover = bootstrap.Popover.getInstance(popoverEl);
        if (popover) {
          popover.setContent({ ".popover-body": popStr });
        }
      }

      function initializeCartUI(cart) {
        for (var item in cart) {
          updateButtonUI(cart, item);
        }
      }

      // Initialize Popover
      const popover = new bootstrap.Popover(
        document.getElementById("popcart"),
        {
          html: true,
          title: "Your Shopping Cart",
          content: "Loading...",
        },
      );

      updateCartDisplay(cart);
      initializeCartUI(cart);
      updatePopover(cart);
    </script>
    {% endblock %}
  </body>
</html>
