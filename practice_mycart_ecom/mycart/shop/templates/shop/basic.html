<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}My Cart{% endblock %}</title>
    <style>
      .carousel-indicators button {
        background-color: blue;
      }

      .carousel-control-prev-icon,
      .carousel-control-next-icon {
        background-color: blue;
      }

      .no-padding {
        padding-left: 0;
        padding-right: 0;
      }
    </style>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">My Cart</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/shop"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shop/about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shop/contact">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shop/tracker">Tracker</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shop/checkout">Checkout</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">
              Search
            </button>
          </form>
          <button
            type="button"
            class="btn btn-secondary mx-2"
            id="popcart"
            data-bs-container="body"
            data-bs-toggle="popover"
            data-bs-placement="bottom"
          >
            Cart (<span id="cartItemCount">0</span>)
          </button>
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    {% block js %}
    <script>
      // Initialize cart from localStorage, handling null case
      if (localStorage.getItem("cart") == null) {
        var cart = {};
      } else {
        var cart = JSON.parse(localStorage.getItem("cart"));
      }

      // --- Event Handlers using Delegation ---

      // Handle Add to Cart click
      $("body").on("click", ".addtocart", function () {
        var idstr = this.id.toString();
        cart[idstr] = (cart[idstr] || 0) + 1;
        updateCartAndUI(cart, idstr);
      });

      // Handle Plus button click
      $("body").on("click", ".plus", function () {
        var idstr = this.id.substring(4); // e.g., from 'pluspr1' to 'pr1'
        cart[idstr] = cart[idstr] + 1;
        updateCartAndUI(cart, idstr);
      });

      // Handle Minus button click
      $("body").on("click", ".minus", function () {
        var idstr = this.id.substring(5); // e.g., from 'minuspr1' to 'pr1'
        cart[idstr] = cart[idstr] - 1;
        if (cart[idstr] <= 0) {
          delete cart[idstr];
        }
        updateCartAndUI(cart, idstr);
      });

      // --- Helper Functions ---

      // Central function to update cart, storage, and UI for a specific item
      function updateCartAndUI(cart, itemId) {
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartDisplay(cart);
        updateButtonUI(cart, itemId);
        updatePopover(cart);
      }

      // Updates the button for a single item based on cart state
      function updateButtonUI(cart, itemId) {
        var buttonContainer = document.getElementById("div" + itemId);
        if (buttonContainer) {
          // Check if the element exists on the page
          var qty = cart[itemId];
          if (qty === undefined || qty <= 0) {
            buttonContainer.innerHTML = `<button id="${itemId}" class="btn btn-sm btn-primary addtocart">Add to Cart</button>`;
          } else {
            buttonContainer.innerHTML = `<button id="minus${itemId}" class='btn btn-sm btn-primary minus'>-</button> <span id='span${itemId}' class="mx-2">${qty}</span> <button id="plus${itemId}" class='btn btn-sm btn-primary plus'>+</button>`;
          }
        }
      }

      // Function to update cart count in navbar
      function updateCartDisplay(cart) {
        var totalItems = Object.values(cart).reduce((a, b) => a + b, 0);
        $("#cartItemCount").text(totalItems);
      }

      // Function to update the popover content
      function updatePopover(cart) {
        var popStr = "<ul>";
        if (Object.keys(cart).length === 0) {
          popStr = "Your cart is empty.";
        } else {
          var i = 1;
          for (var item in cart) {
            popStr += `<li><b>Item ${i}</b> (ID ${item.substring(2)}): Qty: ${cart[item]}</li>`;
            i++;
          }
          popStr +=
            "</ul><a href='/shop/checkout' class='btn btn-primary btn-sm mt-2'>Checkout</a>";
        }

        var popoverEl = document.getElementById("popcart");
        var popover = bootstrap.Popover.getInstance(popoverEl);
        if (popover) {
          popover.setContent({ ".popover-body": popStr });
        }
      }

      // On page load, update the UI for all items already in the cart
      function initializeCartUI(cart) {
        for (var item in cart) {
          updateButtonUI(cart, item);
        }
      }

      // Initialize Popover
      new bootstrap.Popover(document.getElementById("popcart"), {
        html: true,
        title: "Your Shopping Cart",
        content: "Loading...",
      });

      // Initial cart UI setup on page load
      updateCartDisplay(cart);
      initializeCartUI(cart);
      updatePopover(cart);
    </script>
    {% endblock %}
  </body>
</html>
